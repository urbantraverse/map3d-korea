const tooltip = document.getElementById('tooltip');

const eraColor = {
  '~1970': [214, 40, 40, 220],
  '1970s': [214, 40, 40, 220],
  '1980s': [247, 127, 0, 220],
  '1990s': [252, 191, 73, 220],
  '2000+': [144, 190, 109, 220],
  '미상':  [136, 136, 136, 200],
};

const { Deck, PolygonLayer } = deck;

const INITIAL_VIEW_STATE = {
  longitude: 128.5604, latitude: 35.1832,
  zoom: 16, pitch: 55, bearing: 20
};

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  center: [INITIAL_VIEW_STATE.longitude, INITIAL_VIEW_STATE.latitude],
  zoom: INITIAL_VIEW_STATE.zoom,
  pitch: INITIAL_VIEW_STATE.pitch,
  bearing: INITIAL_VIEW_STATE.bearing,
  interactive: true,
});

map.on('load', () => {
  const deckgl = new Deck({
    canvas: 'deck-canvas',
    parent: map.getContainer(),
    initialViewState: INITIAL_VIEW_STATE,
    controller: true,
    onViewStateChange: ({ viewState }) => {
      map.jumpTo({
        center: [viewState.longitude, viewState.latitude],
        zoom: viewState.zoom, pitch: viewState.pitch, bearing: viewState.bearing
      });
    },
    layers: [
      new PolygonLayer({
        id: 'buildings',
        data: data.features,
        extruded: true,
        wireframe: true,
        pickable: true,
        getPolygon: f => f.geometry.coordinates[0][0],
        getElevation: f => Math.max(f.properties.height_m, 3),
        getFillColor: f => eraColor[f.properties.era] || [180, 180, 180, 200],
        getLineColor: f => f.properties.ugrndFlr >= 1 ? [30, 30, 30, 255] : [100, 100, 100, 120],
        getLineWidth: f => f.properties.ugrndFlr >= 1 ? 1.5 : 0.3,
        lineWidthMinPixels: 1,
        onHover: ({ object, x, y }) => {
          if (object) {
            const p = object.properties;
            tooltip.innerHTML = `
              <b>${p.platPlc || ''}</b><br>
              ${p.rd_nm || ''} ${p.buld_no || ''}<br>
              <b>${p.mainPurps || ''}</b> · ${p.strct || ''}<br>
              사용승인: <b>${p.useAprYear || '미상'}</b> (${p.era})<br>
              지상 ${p.grndFlr}층 · 지하 ${p.ugrndFlr}층 ${p.ugrndFlr >= 1 ? '⚠️반지하' : ''}<br>
              연면적 ${p.totArea}㎡ · 가구 ${p.fmlyCnt}
            `;
            tooltip.style.left = (x + 12) + 'px';
            tooltip.style.top = (y + 12) + 'px';
            tooltip.style.display = 'block';
          } else {
            tooltip.style.display = 'none';
          }
        }
      })
    ]
  });
});
